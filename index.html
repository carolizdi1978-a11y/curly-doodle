<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguimiento Digital Tienda</title>
 <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 md:p-6 font-sans min-h-screen text-slate-800">

  <div class="max-w-7xl mx-auto space-y-8">
    
    <!-- ENCABEZADO PRINCIPAL -->
    <div class="grid lg:grid-cols-3 gap-6">
      <div class="bg-white rounded-3xl shadow-md p-6 flex flex-col justify-between border border-slate-200">
        <div class="flex items-center gap-4">
          <div class="bg-blue-100 p-3 rounded-2xl text-blue-700 font-bold text-xl">📋</div>
          <div>
            <h2 class="text-xl font-bold text-slate-800">Seguimiento Digital</h2>
            <p class="text-slate-500 text-xs">Control de actividades en tienda</p>
            <p class="text-[11px] text-blue-600 mt-1 font-semibold bg-blue-50 px-2 py-0.5 rounded">Reinicio automático: Lunes</p>
          </div>
        </div>
        <div class="bg-slate-50 rounded-2xl p-4 mt-4 border border-slate-100">
          <p class="text-slate-500 text-xs font-semibold uppercase tracking-wider">Actividades Registradas</p>
          <p id="total-global" class="text-4xl font-black text-slate-800 mt-1">0</p>
        </div>
      </div>

      <!-- NOTIFICACIONES -->
      <div class="bg-white rounded-3xl shadow-md p-6 lg:col-span-2 border border-slate-200">
        <div class="flex items-center gap-3 mb-4 text-amber-500 font-bold text-lg">
          <span>🔔</span>
          <h2 class="text-xl font-bold text-slate-800">Notificaciones Supervisor</h2>
        </div>
        <div id="contenedor-notificaciones" class="space-y-2 max-h-40 overflow-y-auto pr-2 text-xs text-slate-500">
          Aún no hay actividades registradas.
        </div>
      </div>
    </div>

    <!-- RENDIMIENTO INDIVIDUAL -->
    <div id="grid-auxiliares" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>

    <!-- TABLAS DE CONTROL -->
    <div id="tablas-auxiliares" class="space-y-8"></div>

  </div>

  <script>
    const auxiliares = [
      { nombre: "Auxiliar 1", areas: ["Gaseosas", "Jugos", "Agua", "Alternativas 1", "Botanas 1", "Semillas"] },
      { nombre: "Auxiliar 2", areas: ["Sopas", "Check Out", "Bomboneras", "Desayunos", "Botanas 2", "HYH"] },
      { nombre: "Auxiliar 3", areas: ["Abarrotes", "Galletas", "Repostería", "Dulces", "Botanas 3"] },
      { nombre: "Auxiliar 4", areas: ["Alternativas 2", "Colombina", "Cream Helado", "Koska", "Brikets + Cueros + SIM Card"] }
    ];

    const actividades = ["Inventario", "Limpieza", "Etiquetado", "Surtido"];

    let registros = JSON.parse(localStorage.getItem('tienda_reg_v3')) || [];
    let notificaciones = JSON.parse(localStorage.getItem('tienda_not_v3')) || [];

    function guardar() {
      localStorage.setItem('tienda_reg_v3', JSON.stringify(registros));
      localStorage.setItem('tienda_not_v3', JSON.stringify(notificaciones));
      renderizar();
    }

    function marcarActividad(auxiliar, area, actividad) {
      const hoy = new Date();
      const horaStr = hoy.toLocaleTimeString();
      
      const idx = registros.findIndex(r => r.auxiliar === auxiliar && r.area === area && r.actividad === actividad);
      
      if (idx !== -1) {
        registros.splice(idx, 1);
      } else {
        registros.push({ auxiliar, area, actividad });
        notificaciones.unshift({
          mensaje: "✅ " + auxiliar + " hizo " + actividad + " en " + area,
          hora: horaStr
        });
      }
      guardar();
    }

    function renderizar() {
      document.getElementById('total-global').innerText = registros.length;

      // Render Notificaciones
      const cNotif = document.getElementById('contenedor-notificaciones');
      if (notificaciones.length === 0) {
        cNotif.innerHTML = "Aún no hay actividades registradas.";
      } else {
        let htmlNotif = "";
        for (let i = 0; i < Math.min(notificaciones.length, 5); i++) {
          htmlNotif += "<div class='bg-amber-50 p-2 rounded border border-amber-100 mb-1'><strong>" + notificaciones[i].mensaje + "</strong> <span class='text-slate-400'>(" + notificaciones[i].hora + ")</span></div>";
        }
        cNotif.innerHTML = htmlNotif;
      }

      // Render Tarjetas de Progreso
      let htmlCards = "";
      auxiliares.forEach(aux => {
        const realizadas = registros.filter(r => r.auxiliar === aux.nombre).length;
        const totales = aux.areas.length * actividades.length;
        const porc = totales > 0 ? Math.round((realizadas / totales) * 100) : 0;

        htmlCards += "<div class='bg-white p-5 rounded-3xl shadow-md border border-slate-200'>" +
          "<h3 class='font-bold text-slate-700 text-base'>👤 " + aux.nombre + "</h3>" +
          "<p class='text-2xl font-black text-slate-800 mt-2'>" + realizadas + " <span class='text-xs text-slate-400 font-normal'>/ " + totales + "</span></p>" +
          "<div class='w-full bg-slate-100 rounded-full h-2 mt-3 overflow-hidden'><div class='bg-green-500 h-full' style='width:" + porc + "%'></div></div>" +
          "<p class='text-[10px] text-slate-400 font-bold mt-1'>" + porc + "% COMPLETADO</p>" +
          "</div>";
      });
      document.getElementById('grid-auxiliares').innerHTML = htmlCards;

      // Render Tablas Matriz
      let htmlTablas = "";
      auxiliares.forEach(aux => {
        let tabla = "<div class='bg-white rounded-3xl shadow-md overflow-hidden border border-slate-200'>" +
          "<div class='bg-slate-800 text-white px-6 py-3 font-bold text-base'>Auxiliar: " + aux.nombre + "</div>" +
          "<div class='overflow-x-auto'><table class='w-full text-left text-xs'>" +
          "<thead><tr class='bg-slate-50 border-b border-slate-200'><th class='p-3 font-bold text-slate-600'>Área</th>";
        
        actividades.forEach(act => {
          tabla += "<th class='p-3 text-center font-bold text-slate-600'>" + act + "</th>";
        });
        tabla += "</tr></thead><tbody>";

        aux.areas.forEach(area => {
          tabla += "<tr class='hover:bg-slate-50'><td class='p-3 font-semibold text-slate-700 border-b border-slate-100'>" + area + "</td>";
          
          actividades.forEach(act => {
            const hecho = registros.some(r => r.auxiliar === aux.nombre && r.area === area && r.actividad === act);
            const claseBtn = hecho ? "bg-green-500 text-white border-green-500" : "bg-slate-100 text-slate-400 border-slate-200";
            const textoBtn = hecho ? "✓" : "+";

            tabla += "<td class='p-2 text-center border-b border-slate-100'>" +
              "<button onclick=\"marcarActividad('" + aux.nombre + "', '" + area + "', '" + act + "')\" class='w-8 h-8 rounded-xl border font-bold text-xs cursor-pointer " + claseBtn + "'>" + textoBtn + "</button>" +
              "</td>";
          });
          tabla += "</tr>";
        });

        tabla += "</tbody></table></div></div>";
        htmlTablas += tabla;
      });
      document.getElementById('tablas-auxiliares').innerHTML = htmlTablas;
    }

    renderizar();
  </script>
</body>
</html>
