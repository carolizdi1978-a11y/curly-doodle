<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Tienda</title>
  <script src="https://jsdelivr.net"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { background-color: #f1f5f9; padding: 16px; color: #1e293b; min-height: 100vh; }
    .contenedor { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .login-box { max-width: 400px; margin: 80px auto; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e2e8f0; }
    .select-input, .text-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 14px; background: white; }
    .tarjeta { background: white; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; }
    .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #1e293b; color: white; padding: 14px 20px; border-radius: 16px; }
    .grid-supervisor { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
    .barra-bg { width: 100%; background: #e2e8f0; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .barra-fill { background: #22c55e; height: 100%; width: 0%; transition: width 0.3s; }
    .tabla-bloque { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; margin-top: 10px; }
    .tabla-head { background: #334155; color: white; padding: 12px 20px; font-weight: bold; }
    .tabla-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
    th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; color: #64748b; font-weight: bold; }
    .td-area { text-align: left; font-weight: bold; background: #f8fafc; width: 220px; color: #334155; }
    .btn { background: #2563eb; color: white; border: none; padding: 10px 16px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .btn-green { background: #16a34a; } .btn-gray { background: #64748b; }
    .btn-check { width: 34px; height: 34px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: bold; cursor: pointer; }
    .btn-hecho { background: #22c55e; color: white; border-color: #22c55e; cursor: not-allowed !important; }
    .btn-pendiente { background: #f8fafc; color: #94a3b8; }
    .btn-solo-lectura { cursor: not-allowed !important; opacity: 0.7; }
    .hidden { display: none; }
    .historial-row { padding: 10px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <div id="view-login" class="login-box">
    <h2 style="font-size: 22px; font-weight: 800;">Acceso a la Tienda</h2>
    <select id="login-usuario" class="select-input">
      <option value="Auxiliar 1">👤 Auxiliar 1</option>
      <option value="Auxiliar 2">👤 Auxiliar 2</option>
      <option value="Auxiliar 3">👤 Auxiliar 3</option>
      <option value="Auxiliar 4">👤 Auxiliar 4</option>
      <option value="Supervisor">👔 Supervisor General</option>
    </select>
    <input type="password" id="login-pass" placeholder="Contraseña (Solo Supervisor)" class="text-input">
    <button onclick="ingresarSistema()" class="btn" style="width: 100%; padding: 12px; margin-top: 10px;">Ingresar al Panel</button>
  </div>

  <div id="view-app" class="contenedor hidden">
    <div class="nav-bar">
      <div><span style="font-size: 12px; color: #94a3b8; display: block;">Sesión de hoy:</span><strong id="txt-usuario-nav" style="font-size: 16px;"></strong></div>
      <button onclick="cerrarSesion()" class="btn btn-gray" style="padding: 6px 12px; font-size: 11px;">Cerrar Sesión 🚪</button>
    </div>
    <div id="panel-supervisor" class="hidden" style="display: none; flex-direction: column; gap: 20px;">
      <div class="tarjeta" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <div><h2 style="font-size: 18px; font-weight: bold;">Consola del Supervisor</h2><p style="color:#64748b; font-size:12px;">Vista de solo lectura • Nube Sincronizada</p></div>
        <button onclick="exportarExcelActual()" class="btn btn-green">Descargar Excel 📥</button>
      </div>
      <div class="tarjeta">
        <h3 style="font-size: 14px; font-weight: bold; margin-bottom: 12px;">📈 Avance del Personal</h3>
        <div id="sup-grid-progreso" class="grid-supervisor"></div>
      </div>
      <div class="tarjeta">
        <h3 style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">🗄️ Historial Semanal</h3>
        <div id="sup-contenedor-historial" style="max-height: 150px; overflow-y: auto;"></div>
      </div>
    </div>
    <div id="panel-auxiliar" class="tarjeta hidden" style="display: none; background: linear-gradient(135deg, #1e3a8a, #1e40af); color: white;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div><p style="font-size: 12px; color: #bfdbfe;">MI PROGRESO INDIVIDUAL</p><p style="font-size: 24px; font-weight: 900;" id="aux-txt-avance">0 / 0</p></div>
        <div style="text-align: right;"><p id="aux-txt-porc" style="font-size: 22px; font-weight: bold;">0%</p></div>
      </div>
      <div class="barra-bg" style="background: rgba(255,255,255,0.2); margin-top: 12px;"><div id="aux-barra-fill" class="barra-fill" style="background: #4ade80;"></div></div>
    </div>
    <div id="contenedor-tablas" style="display: flex; flex-direction: column; gap: 20px;"></div>
  </div>

  <script>
    const supabase = window.supabase.createClient("https://supabase.co", "sb_publishable_TRw3PV1ir6aoMw6ZY_oygQ_DchbJMmOunL9tE8oZ_fO82K0nclH_QhHh5Oid3v_RskrW4BqG6-p0v70f_D");

    const auxiliares = [
      { nombre: "Auxiliar 1", areas: ["Gaseosas", "Jugos", "Agua", "Alternativas 1", "Botanas 1", "Semillas"] },
      { nombre: "Auxiliar 2", areas: ["Sopas", "Check Out", "Bomboneras", "Desayunos", "Botanas 2", "HYH"] },
      { nombre: "Auxiliar 3", areas: ["Abarrotes", "Galletas", "Repostería", "Dulces", "Botanas 3"] },
      { nombre: "Auxiliar 4", areas: ["Alternativas 2", "Colombina", "Cream Helado", "Koska", "Brikets + Cueros + SIM Card"] }
    ];
    const actividades = ["Inventario", "Limpieza", "Etiquetado", "Surtido"];
    const CLAVE_SUPERVISOR = "1234";

    let registros = [], informesSemanales = [], usuarioLogueado = null;

    async function descargarDatosCloud() {
      try {
        let { data: rC } = await supabase.from('registros_tienda').select('*'); if (rC) registros = rC;
        let { data: iC } = await supabase.from('informes_semanales').select('*').order('id', { ascending: false }); if (iC) informesSemanales = iC;
      } catch (e) { console.error(e); }
      renderizar();
    }

    async function ingresarSistema() {
      const u = document.getElementById('login-usuario').value;
      if (u === "Supervisor" && document.getElementById('login-pass').value !== "1234") return alert("Clave incorrecta.");
      usuarioLogueado = u;
      document.getElementById('view-login').classList.add('hidden');
      document.getElementById('view-app').classList.remove('hidden');
      document.getElementById('txt-usuario-nav').innerText = u === "Supervisor" ? "👔 Supervisor" : "👤 " + u;
      document.getElementById('login-pass').value = "";
      await descargarDatosCloud();
    }

    function cerrarSesion() { usuarioLogueado = null; document.getElementById('view-app').classList.add('hidden'); document.getElementById('view-login').classList.remove('hidden'); }

    async function verificarReinicioLunes() {
      const hoy = new Date();
      if (hoy.getDay() === 1) {
        const ult = localStorage.getItem('t_cloud_reinicio_v5'), hoyT = hoy.toLocaleDateString();
        if (ult !== hoyT && registros.length > 0) {
          await supabase.from('informes_semanales').insert([{ fecha_cierre: hoyT, datos_json: registros }]);
          await supabase.from('registros_tienda').delete().neq('id', 0);
          localStorage.setItem('t_cloud_reinicio_v5', hoyT); await descargarDatosCloud();
        }
      }
    }

    async function marcarActividad(auxiliar, area, actividad) {
      if (usuarioLogueado === "Supervisor") return alert("Acceso denegado: El panel es de SOLO LECTURA.");
      if (registros.some(r => r.auxiliar === auxiliar && r.area === area && r.actividad === actividad)) return alert("No puedes desmarcar actividades.");
      const { error } = await supabase.from('registros_tienda').insert([{ auxiliar, area, actividad }]);
      if (!error) await descargarDatosCloud();
    }

    function descargarCSV(n, filas) {
      let csv = "data:text/csv;charset=utf-8,\uFEFF"; filas.forEach(f => { csv += f.map(c => `"${c}"`).join(",") + "\r\n"; });
      const link = document.createElement("a"); link.setAttribute("href", encodeURI(csv)); link.setAttribute("download", n);
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function exportarExcelActual() {
      if (registros.length === 0) return alert("No hay registros.");
      const f = [["Auxiliar", "Área", "Actividad"]]; registros.forEach(r => f.push([r.auxiliar, r.area, r.actividad]));
      descargarCSV("Reporte_Actual_" + new Date().toLocaleDateString() + ".csv", f);
    }

    function exportarHistorico(id) {
      const inf = informesSemanales.find(i => i.id === id); if (!inf) return;
      const f = [["Auxiliar", "Área", "Actividad"]]; inf.datos_json.forEach(r => f.push([r.auxiliar, r.area, r.actividad]));
      descargarCSV("Reporte_Cierre_" + inf.fecha_cierre + ".csv", f);
    }

    function renderizar() {
      verificarReinicioLunes();
const pSup = document.getElementById('panel-supervisor'), pAux = document.getElementById('panel-auxiliar');if (usuarioLogueado === "Supervisor") {if (pSup) pSup.style.display = "flex"; if (pAux) pAux.style.display = "none";let hG = ""; auxiliares.forEach(aux => {const r = registros.filter(rg => rg.auxiliar === aux.nombre).length, t = aux.areas.length * actividades.length, p = t > 0 ? Math.round((r / t) * 100) : 0;hG += <div style="background:#f8fafc; padding:12px; border-radius:12px; border:1px solid #e2e8f0;"><strong>👤 ${aux.nombre} (${p}%)</strong><div class="barra-bg"><div class="barra-fill" style="width:${p}%;"></div></div></div>;});document.getElementById('sup-grid-progreso').innerHTML = hG;const cH = document.getElementById('sup-contenedor-historial');if (cH) cH.innerHTML = informesSemanales.length === 0 ? "Sin reportes." : informesSemanales.map(inf => <div class="historial-row"><span>📅 Cierre: ${inf.fecha_cierre}</span><button onclick="exportarHistorico(${inf.id})" class="btn btn-gray" style="padding:4px 8px; font-size:11px;">Excel</button></div>).join('');} else {if (pSup) pSup.style.display = "none"; if (pAux) pAux.style.display = "block";const aD = auxiliares.find(a => a.nombre === usuarioLogueado);if (aD) {const r = registros.filter(rg => rg.auxiliar === usuarioLogueado).length, t = aD.areas.length * actividades.length, p = t > 0 ? Math.round((r / t) * 100) : 0;document.getElementById('aux-txt-avance').innerText = r + " / " + t; document.getElementById('aux-txt-porc').innerText = p + "%"; document.getElementById('aux-barra-fill').style.width = p + "%";}}const cT = document.getElementById('contenedor-tablas');if (cT) {cT.innerHTML = "";auxiliares.forEach(aux => {if (usuarioLogueado !== "Supervisor" && usuarioLogueado !== aux.nombre) return;let hT = <div class="tabla-bloque"><div class="tabla-head"><span>📋 Matriz: ${aux.nombre}</span></div><div class="tabla-scroll"><table><thead><tr><th class="td-area">Área</th>;actividades.forEach(act => { hT += <th>${act}</th>; }); hT += </tr></thead><tbody>;aux.areas.forEach(ar => {hT += <tr><td class="td-area">${ar}</td>;actividades.forEach(ac => {const h = registros.some(r => r.auxiliar === aux.nombre && r.area === ar && r.actividad === ac);let cB = h ? "btn-check btn-hecho" : (usuarioLogueado === "Supervisor" ? "btn-check btn-pendiente btn-solo-lectura" : "btn-check btn-pendiente");hT += <td><button onclick="marcarActividad('${aux.nombre}', '${ar}', '${ac}')" class="${cB}">${h ? '✓' : '+'}</button></td>;}); hT += </tr>;}); cT.innerHTML += hT + </tbody></table></div></div>;});}}window.onload = function() { renderizar(); }
