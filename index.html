<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguimiento Digital Tienda</title>
  <!-- Cargamos Tailwind CSS de forma estándar y segura -->
  <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 md:p-6 font-sans min-h-screen">

  <div class="max-w-7xl mx-auto space-y-8">
    
    <!-- CONTENEDOR SUPERIOR -->
    <div class="grid lg:grid-cols-3 gap-6">
      
      <!-- Panel de Control Principal -->
      <div class="bg-white rounded-3xl shadow-lg p-6 flex flex-col justify-between">
        <div class="flex items-center gap-4">
          <div class="bg-blue-100 p-3 rounded-2xl text-blue-700 shrink-0">
            <!-- Ícono Manual Pequeño de Clipboard -->
            <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
          </div>
          <div>
            <h2 class="text-xl font-bold text-slate-800">Seguimiento Digital</h2>
            <p class="text-slate-500 text-xs">Control de actividades en tienda</p>
            <p class="text-[11px] text-blue-600 mt-1 font-medium bg-blue-50 px-2 py-0.5 rounded-md inline-block">Reinicio automático cada lunes</p>
          </div>
        </div>
        <div class="bg-slate-50 rounded-2xl p-4 mt-4 border border-slate-100">
          <p class="text-slate-500 text-xs font-semibold uppercase tracking-wider">Actividades Registradas</p>
          <p id="total-global" class="text-4xl font-black text-slate-800 mt-1">0</p>
        </div>
      </div>

      <!-- Panel de Notificaciones -->
      <div class="bg-white rounded-3xl shadow-lg p-6 lg:col-span-2">
        <div class="flex items-center gap-3 mb-4 text-amber-500">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
          <h2 class="text-xl font-bold text-slate-800">Notificaciones Supervisor</h2>
        </div>
        <div id="contenedor-notificaciones" class="space-y-2 max-h-40 overflow-y-auto pr-2">
          <!-- Se llena automáticamente -->
        </div>
      </div>

    </div>

    <!-- TARJETAS DE PROGRESO DE AUXILIARES -->
    <div id="grid-auxiliares" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <!-- Se llena automáticamente -->
    </div>

    <!-- MATRICES DE TRABAJO (TABLAS) -->
    <div id="tablas-auxiliares" class="space-y-8">
      <!-- Se llena automáticamente -->
    </div>

  </div>

  <script>
    // Configuración estructural idéntica a tu código original de React
    const auxiliares = [
      { nombre: "Auxiliar 1", areas: ["Gaseosas", "Jugos", "Agua", "Alternativas 1", "Botanas 1", "Semillas"] },
      { nombre: "Auxiliar 2", areas: ["Sopas", "Check Out", "Bomboneras", "Desayunos", "Botanas 2", "HYH"] },
      { nombre: "Auxiliar 3", areas: ["Abarrotes", "Galletas", "Repostería", "Dulces", "Botanas 3"] },
      { nombre: "Auxiliar 4", areas: ["Alternativas 2", "Colombina", "Cream Helado", "Koska", "Brikets + Cueros + SIM Card"] }
    ];

    const actividades = ["Inventario", "Limpieza", "Etiquetado", "Surtido"];

    let registros = JSON.parse(localStorage.getItem('tienda_registros_v2')) || [];
    let notificaciones = JSON.parse(localStorage.getItem('tienda_notificaciones_v2')) || [];

    function verificarReinicioLunes() {
      const hoy = new Date();
      if (hoy.getDay() === 1) {
        const ultimaFechaReinicio = localStorage.getItem('ultimo_reinicio_v2');
        const fechaHoyTexto = hoy.toLocaleDateString();

        if (ultimaFechaReinicio !== fechaHoyTexto && registros.length > 0) {
          registros = [];
          notificaciones = [{
            mensaje: "🔄 Reinicio semanal realizado. Las actividades fueron desbloqueadas.",
            fecha: fechaHoyTexto,
            hora: hoy.toLocaleTimeString(),
            id: Date.now()
          }];
          localStorage.setItem('ultimo_reinicio_v2', fechaHoyTexto);
          guardarLocalStorage();
        }
      }
    }

    function guardarLocalStorage() {
      localStorage.setItem('tienda_registros_v2', JSON.stringify(registros));
      localStorage.setItem('tienda_notificaciones_v2', JSON.stringify(notificaciones));
    }

    function marcarActividad(auxiliar, area, actividad) {
      const hoy = new Date();
      const fecha = hoy.toLocaleDateString();
      const hora = hoy.toLocaleTimeString();

      const indice = registros.findIndex(r => r.auxiliar === auxiliar && r.area === area && r.actividad === actividad);
      
      if (indice !== -1) {
        registros.splice(indice, 1);
      } else {
        registros.push({ auxiliar, area, actividad, fecha, hora, id: Date.now() });
        notificaciones.unshift({
          mensaje: `✅ \${auxiliar} realizó \({actividad} en\){area}`,
          fecha, hora, id: Date.now() + Math.random()
        });
      }

      guardarLocalStorage();
      renderizar();
    }

    function renderizar() {
      verificarReinicioLunes();

      // Total Global
      document.getElementById('total-global').innerText = registros.length;

      // Notificaciones
      const contNotif = document.getElementById('contenedor-notificaciones');
      if (notificaciones.length === 0) {
        contNotif.innerHTML = `<div class="text-center text-slate-400 text-sm py-4 bg-slate-50 rounded-xl border border-dashed">Aún no hay actividades registradas.</div>`;
      } else {
        contNotif.innerHTML = notificaciones.map(item => `
          <div class="bg-amber-50/60 border border-amber-100 rounded-xl p-3 text-xs">
            <p class="font-semibold text-slate-700">\${item.mensaje}</p>
            <p class="text-slate-400 mt-1 text-[10px]">\({item.fecha} •\){item.hora}</p>
          </div>
        `).join('');
      }

      // Tarjetas de progreso superiores
      const gridAux = document.getElementById('grid-auxiliares');
      gridAux.innerHTML = auxiliares.map(auxiliar => {
        const realizadas = registros.filter(r => r.auxiliar === auxiliar.nombre).length;
        const totalesPosibles = auxiliar.areas.length * actividades.length;
        const porcentaje = totalesPosibles > 0 ? Math.round((realizadas / totalesPosibles) * 100) : 0;

        return `
          <div class="bg-white rounded-3xl shadow-md p-5 border border-slate-100 flex flex-col justify-between">
            <div>
              <div class="flex items-center gap-3 mb-3">
                <div class="bg-green-100 p-2 rounded-xl text-green-700">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <h3 class="font-bold text-slate-700">\${auxiliar.nombre}</h3>
              </div>
              <p class="text-3xl font-extrabold text-slate-800 mt-1">\({realizadas} <span class="text-xs text-slate-400 font-normal">/ \){totalesPosibles}</span></p>
            </div>
            <div class="mt-4">
              <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1">
                <span>PROGRESO</span><span>\${porcentaje}%</span>
              </div>
              <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                <div class="bg-green-500 h-full transition-all duration-300" style="width: \${porcentaje}%"></div>
              </div>
            </div>
          </div>`;
      }).join('');

      // Render de Tablas Completas
      const tablaContainer = document.getElementById('tablas-auxiliares');
      tablaContainer.innerHTML = auxiliares.map(auxiliar => {
        
        let thActividades = '';
        actividades.forEach(act => {
          thActividades += `<th class="p-3 text-center font-bold tracking-wide text-slate-600">\${act}</th>`;
        });

        let filasTabla = '';
        auxiliar.areas.forEach(area => {
          let columnasActividades = '';
          
          actividades.forEach(actividad => {
            const completada = registros.some(r => r.auxiliar === auxiliar.nombre && r.area === area && r.actividad === actividad);
            
            const btnClass = completada 
              ? 'bg-green-500 text-white border-green-500 shadow-sm font-bold' 
              : 'bg-slate-50 border-slate-200 text-slate-400 hover:border-blue-500 hover:text-blue-500 hover:bg-blue-50';

            columnasActividades += `
              <td class="p-2 text-center border-b border-slate-100">
                <button onclick="marcarActividad('\${auxiliar.nombre}', '\({area}', '\){actividad}')" class="mx-auto w-8 h-8 rounded-xl border flex items-center justify-center font-semibold text-xs cursor-pointer transition-all active:scale-90 \${btnClass}">
                  \${completada ? '✓' : '+'}
                </button>
              </td>`;
          });

          filasTabla += `
            <tr class="hover:bg-slate-50/80 transition-colors">
              <td class="p-3 font-semibold text-slate-700 border-b border-slate-100 bg-slate-50/30 text-xs md:text-sm">\({area}</td>\){columnasActividades}
            </tr>`;
        });

        return `
          <div class="bg-white rounded-3xl shadow-lg overflow-hidden border border-slate-200">
            <div class="bg-slate-800 text-white px-6 py-4 flex justify-between items-center">
              <h2 class="text-lg font-bold">👤 \${auxiliar.nombre}</h2>Matriz de ActividadesÁrea${thActividades}${filasTabla}`;}).join('');}renderizar();
